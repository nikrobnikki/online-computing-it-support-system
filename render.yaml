services:
  # ─── Backend — Node.js Web Service ──────────────────────────────────────────
  - type: web
    name: kiratech-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      # Database — set these in Render Dashboard
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: 3306
      - key: DB_NAME
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 7d
      # Frontend URL (update after deploying frontend)
      - key: CLIENT_URL
        sync: false
      # Email
      - key: EMAIL_HOST
        value: smtp.gmail.com
      - key: EMAIL_PORT
        value: 587
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: EMAIL_FROM
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_NAME
        sync: false
      # Stripe
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: usd
      # Mobile Money
      - key: MPESA_TZ_BUSINESS_NUMBER
        sync: false
      - key: MPESA_TZ_ACCOUNT_REF
        value: KIRATECH
      - key: AIRTEL_MERCHANT_NUMBER
        sync: false
      - key: TIGO_BILLER_MSISDN
        sync: false
      - key: MTN_MERCHANT_NUMBER
        sync: false
      # Crypto
      - key: USDT_BEP20_ADDRESS
        sync: false
      - key: USDT_TRC20_ADDRESS
        sync: false
      - key: USDT_ERC20_ADDRESS
        sync: false
      - key: BINANCE_MERCHANT_ID
        sync: false

  # ─── Frontend — Static Site ──────────────────────────────────────────────────
  - type: web
    name: kiratech-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      # SPA — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # Set this to your backend Render URL after backend deploys
      - key: VITE_API_URL
        sync: false
      - key: VITE_STRIPE_PUBLISHABLE_KEY
        sync: false
